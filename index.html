<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f9e8e0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="寶寶奶粉紀錄" />
  <title>🍼 寶寶奶粉紀錄</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fdf6f0;
      --blush: #f9e8e0;
      --rose: #e8a598;
      --rose-deep: #d4756a;
      --sage: #b5c9b7;
      --sage-deep: #7da880;
      --lavender: #d4c5e2;
      --lavender-deep: #9b7ec8;
      --text: #3d2c28;
      --text-soft: #8a6e6a;
      --white: #ffffff;
      --shadow: rgba(180,100,90,0.12);
      --radius: 20px;
      --radius-sm: 12px;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; }

    /* ── TOP BAR ── */
    .topbar { background:var(--blush); padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(232,165,152,0.3); gap:10px; }
    .topbar-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
    .topbar-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; color:var(--rose-deep); white-space:nowrap; }
    .topbar-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
    .topbar-date { font-size:12px; color:var(--text-soft); font-weight:500; }
    .sync-status { font-size:11px; display:flex; align-items:center; gap:4px; }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:#ccc; flex-shrink:0; }
    .sync-dot.ok { background:#7da880; }
    .sync-dot.err { background:#e05252; }
    .sync-dot.loading { background:#f0c060; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── BABY SELECTOR ── */
    .baby-bar { padding:12px 16px 0; display:flex; align-items:center; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .baby-bar::-webkit-scrollbar { display:none; }
    .baby-tab { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--white); border:2px solid var(--blush); border-radius:20px; font-size:13px; font-weight:600; color:var(--text-soft); cursor:pointer; white-space:nowrap; transition:all 0.15s; flex-shrink:0; box-shadow:0 2px 8px var(--shadow); }
    .baby-tab.active { background:var(--rose-deep); border-color:var(--rose-deep); color:white; }
    .baby-tab .avatar { font-size:16px; }
    .btn-add-baby { width:38px; height:38px; background:var(--blush); border:2px dashed var(--rose); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--rose-deep); cursor:pointer; flex-shrink:0; transition:all 0.15s; }
    .btn-add-baby:active { transform:scale(0.9); }

    /* ── SUMMARY CARDS ── */
    .summary-section { padding:14px 16px 8px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .card { background:var(--white); border-radius:var(--radius); padding:14px 12px; box-shadow:0 4px 16px var(--shadow); }
    .card-label { font-size:11px; color:var(--text-soft); font-weight:500; margin-bottom:6px; }
    .card-value { font-family:'Nunito',sans-serif; font-size:26px; font-weight:900; color:var(--rose-deep); line-height:1; }
    .card-unit { font-size:12px; font-weight:700; color:var(--text-soft); margin-left:1px; }
    .card-sub { font-size:11px; color:var(--text-soft); margin-top:4px; }
    .card.lavender .card-value { color:var(--lavender-deep); }
    .card.sage .card-value { color:var(--sage-deep); font-size:18px; margin-top:4px; }

    /* ── ADD BUTTON ── */
    .add-btn-wrap { padding:12px 16px 8px; }
    .add-btn { width:100%; background:linear-gradient(135deg,var(--rose-deep),#c45f54); color:white; border:none; border-radius:var(--radius); padding:16px; font-size:17px; font-family:'Nunito',sans-serif; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 6px 20px rgba(212,117,106,0.4); transition:transform 0.1s; }
    .add-btn:active { transform:scale(0.97); }
    .add-btn:disabled { opacity:0.5; cursor:not-allowed; }

    /* ── RECORDS ── */
    .section-header { padding:12px 16px 8px; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:8px; }
    .records-list { padding:0 16px 100px; display:flex; flex-direction:column; gap:10px; }
    .record-card { background:var(--white); border-radius:var(--radius); padding:14px; box-shadow:0 2px 12px var(--shadow); display:flex; align-items:center; gap:12px; animation:fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .record-icon { width:46px; height:46px; background:var(--blush); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .record-info { flex:1; min-width:0; }
    .record-time { font-family:'Nunito',sans-serif; font-size:17px; font-weight:800; color:var(--text); }
    .record-nth { font-size:12px; color:var(--text-soft); font-weight:500; margin-left:4px; }
    .record-amount { font-size:13px; color:var(--rose-deep); font-weight:700; margin-top:2px; }
    .record-meta { font-size:12px; color:var(--text-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .record-actions { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
    .btn-icon { width:36px; height:36px; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:transform 0.1s; }
    .btn-icon:active { transform:scale(0.9); }
    .btn-edit { background:var(--blush); }
    .btn-delete { background:#fde8e8; }
    .empty-state { text-align:center; padding:40px 24px; color:var(--text-soft); }
    .empty-state .emoji { font-size:44px; margin-bottom:12px; }
    .empty-state p { font-size:14px; line-height:1.7; }

    /* ── MODAL ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(61,44,40,0.5); z-index:200; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--cream); border-radius:28px 28px 0 0; padding:24px 20px 40px; width:100%; max-width:430px; animation:slideUp 0.3s ease; max-height:92vh; overflow-y:auto; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:40px; height:4px; background:var(--rose); border-radius:2px; margin:0 auto 20px; opacity:0.5; }
    .modal-title { font-family:'Nunito',sans-serif; font-size:20px; font-weight:900; color:var(--text); margin-bottom:20px; text-align:center; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:13px; font-weight:700; color:var(--text-soft); margin-bottom:8px; letter-spacing:0.3px; }
    .form-input { width:100%; background:var(--white); border:2px solid transparent; border-radius:var(--radius-sm); padding:13px 16px; font-size:16px; font-family:'Noto Sans TC',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s; box-shadow:0 2px 8px var(--shadow); }
    .form-input:focus { border-color:var(--rose); }
    .form-input::placeholder { color:#c8b0ac; }
    .brand-chips { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:8px; }
    .brand-chip { background:var(--white); border:2px solid var(--blush); border-radius:16px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--text-soft); cursor:pointer; transition:all 0.15s; }
    .brand-chip.selected { background:var(--rose-deep); border-color:var(--rose-deep); color:white; }
    .amount-stepper { display:flex; align-items:center; gap:12px; }
    .stepper-btn { width:48px; height:48px; background:var(--blush); border:none; border-radius:14px; font-size:22px; font-weight:700; color:var(--rose-deep); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.1s; }
    .stepper-btn:active { transform:scale(0.9); }
    .stepper-display { flex:1; text-align:center; font-family:'Nunito',sans-serif; font-size:28px; font-weight:900; color:var(--rose-deep); }
    .stepper-unit { font-size:14px; color:var(--text-soft); font-weight:600; }
    .modal-actions { display:flex; gap:10px; margin-top:24px; }
    .btn-cancel { flex:1; padding:15px; background:var(--blush); border:none; border-radius:var(--radius-sm); font-size:16px; font-family:'Nunito',sans-serif; font-weight:800; color:var(--text-soft); cursor:pointer; }
    .btn-save { flex:2; padding:15px; background:linear-gradient(135deg,var(--rose-deep),#c45f54); border:none; border-radius:var(--radius-sm); font-size:16px; font-family:'Nunito',sans-serif; font-weight:800; color:white; cursor:pointer; }

    /* ── BABY MODAL ── */
    .emoji-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:16px; }
    .emoji-opt { width:100%; aspect-ratio:1; background:var(--white); border:2px solid var(--blush); border-radius:12px; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; }
    .emoji-opt.selected { border-color:var(--rose-deep); background:var(--blush); }

    /* ── CONFIRM ── */
    .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(61,44,40,0.5); z-index:300; align-items:center; justify-content:center; padding:24px; }
    .confirm-overlay.open { display:flex; }
    .confirm-box { background:var(--white); border-radius:var(--radius); padding:28px 24px; width:100%; max-width:340px; text-align:center; animation:popIn 0.2s ease; }
    @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
    .confirm-emoji { font-size:36px; margin-bottom:12px; }
    .confirm-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; margin-bottom:8px; }
    .confirm-sub { font-size:14px; color:var(--text-soft); margin-bottom:24px; }
    .confirm-actions { display:flex; gap:10px; }
    .btn-cc { flex:1; padding:14px; background:var(--blush); border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:700; font-family:'Nunito',sans-serif; color:var(--text-soft); cursor:pointer; }
    .btn-cd { flex:1; padding:14px; background:#e05252; border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:700; font-family:'Nunito',sans-serif; color:white; cursor:pointer; }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:white; padding:12px 20px; border-radius:20px; font-size:14px; font-weight:500; z-index:500; transition:transform 0.3s ease; white-space:nowrap; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">🍼 奶粉紀錄</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-date" id="todayDate"></div>
      <div class="sync-status">
        <div class="sync-dot loading" id="syncDot"></div>
        <span id="syncText" style="font-size:11px;color:var(--text-soft)">連線中…</span>
      </div>
    </div>
  </div>

  <!-- BABY SELECTOR BAR -->
  <div class="baby-bar" id="babyBar">
    <!-- tabs rendered by JS -->
    <div class="btn-add-baby" onclick="openBabyModal()" title="新增寶寶">＋</div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-section">
    <div class="card">
      <div class="card-label">📊 今日總量</div>
      <div><span class="card-value" id="totalAmount">0</span><span class="card-unit">ml</span></div>
      <div class="card-sub" id="totalCount">共 0 次</div>
    </div>
    <div class="card lavender">
      <div class="card-label">🍼 今日次數</div>
      <div><span class="card-value" id="feedCount">0</span><span class="card-unit">次</span></div>
      <div class="card-sub" id="avgAmount">平均 — ml</div>
    </div>
    <div class="card sage">
      <div class="card-label">⏰ 最後餵奶</div>
      <div class="card-value" id="lastFeedTime" style="font-size:18px;margin-top:4px">—</div>
      <div class="card-sub" id="lastFeedAgo"></div>
    </div>
  </div>

  <!-- ADD BUTTON -->
  <div class="add-btn-wrap">
    <button class="add-btn" id="addBtn" onclick="openModal()">＋ 新增餵奶紀錄</button>
  </div>

  <!-- RECORD LIST -->
  <div class="section-header" id="listHeader">📋 今日紀錄</div>
  <div class="records-list" id="recordsList"></div>

  <!-- ── ADD/EDIT RECORD MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalTitle">新增餵奶紀錄</div>

      <div class="form-group">
        <label class="form-label">⏰ 時間</label>
        <input type="datetime-local" class="form-input" id="inputTime" />
      </div>
      <div class="form-group">
        <label class="form-label">🍼 奶量（ml）</label>
        <div class="amount-stepper">
          <button class="stepper-btn" onclick="changeAmount(-10)">－</button>
          <div class="stepper-display"><span id="amountDisplay">120</span><span class="stepper-unit"> ml</span></div>
          <button class="stepper-btn" onclick="changeAmount(+10)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">🏷️ 奶粉品牌</label>
        <div class="brand-chips" id="brandChips"></div>
        <input type="text" class="form-input" id="inputBrand" placeholder="或直接輸入品牌名稱" />
      </div>
      <div class="form-group">
        <label class="form-label">📝 備註（選填）</label>
        <input type="text" class="form-input" id="inputNote" placeholder="例：喝得很好、有溢奶…" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="saveRecord()">💾 儲存</button>
      </div>
    </div>
  </div>

  <!-- ── ADD/EDIT BABY MODAL ── -->
  <div class="modal-overlay" id="babyModalOverlay" onclick="handleBabyOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="babyModalTitle">新增寶寶</div>
      <div class="form-group">
        <label class="form-label">👶 寶寶名字</label>
        <input type="text" class="form-input" id="inputBabyName" placeholder="例：小明、寶寶" maxlength="10" />
      </div>
      <div class="form-group">
        <label class="form-label">🎨 選擇頭像</label>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeBabyModal()">取消</button>
        <button class="btn-save" onclick="saveBaby()">💾 儲存</button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-emoji">🗑️</div>
      <div class="confirm-title">確定要刪除？</div>
      <div class="confirm-sub">這筆紀錄將永久刪除，無法還原。</div>
      <div class="confirm-actions">
        <button class="btn-cc" onclick="closeConfirm()">取消</button>
        <button class="btn-cd" onclick="confirmDelete()">刪除</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, set, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    // ══════════════════════════════════════
    //  Firebase 設定（已內建，不需手動輸入）
    // ══════════════════════════════════════
    const FIREBASE_CONFIG = {
      databaseURL: "https://baby-feed-dbaf5-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    // ══ 完整奶粉品牌清單 ══
    const BRANDS = [
      '愛他美','牛欄牌','明治','亞培','桂格',
      '雀巢','美強生','惠氏','貝親','森永',
      '豐力富','飛達兒','嘉寶','喜寶','其他'
    ];

    // ══ 寶寶頭像選項 ══
    const AVATARS = ['👶','🐣','🐥','🌸','⭐','🌈','🦋','🐧','🐨','🐼','🐸','🦊'];

    // ══ State ══
    let records = [];
    let babies = [];
    let currentBabyId = null;
    let editingRecordId = null;
    let editingBabyId = null;
    let deletingId = null;
    let currentAmount = 120;
    let selectedAvatar = '👶';
    let db = null;

    // ══ Init ══
    function init() {
      renderDate();
      buildBrandChips();
      buildEmojiGrid();
      setInterval(renderSummary, 60000);
      connectFirebase();
    }

    function connectFirebase() {
      try {
        setSyncStatus('loading', '連線中…');
        const app = initializeApp(FIREBASE_CONFIG);
        db = getDatabase(app);

        // 監聽寶寶列表
        onValue(ref(db, 'babies'), snap => {
          const d = snap.val();
          babies = d ? Object.entries(d).map(([k,v]) => ({ ...v, fbKey:k })) : [];
          if (!currentBabyId && babies.length > 0) currentBabyId = babies[0].id;
          renderBabyBar();
          renderAll();
        });

        // 監聽所有紀錄
        onValue(ref(db, 'records'), snap => {
          const d = snap.val();
          records = d ? Object.entries(d).map(([k,v]) => ({ ...v, fbKey:k })) : [];
          renderAll();
          setSyncStatus('ok', '已同步');
        }, () => setSyncStatus('err', '連線失敗'));

      } catch(e) {
        setSyncStatus('err', '連線失敗');
        showToast('⚠️ 雲端連線失敗');
      }
    }

    function setSyncStatus(state, text) {
      document.getElementById('syncDot').className = 'sync-dot ' + state;
      document.getElementById('syncText').textContent = text;
    }

    // ══ Render ══
    function renderAll() {
      renderSummary();
      renderList();
      updateAddBtn();
    }

    function updateAddBtn() {
      const btn = document.getElementById('addBtn');
      btn.disabled = !currentBabyId;
      btn.textContent = currentBabyId ? '＋ 新增餵奶紀錄' : '＋ 請先新增寶寶';
    }

    function renderDate() {
      document.getElementById('todayDate').textContent =
        new Date().toLocaleDateString('zh-TW', { month:'long', day:'numeric', weekday:'short' });
    }

    // ══ Baby Bar ══
    function renderBabyBar() {
      const bar = document.getElementById('babyBar');
      const addBtn = bar.querySelector('.btn-add-baby');
      // remove old tabs
      bar.querySelectorAll('.baby-tab').forEach(el => el.remove());
      // insert tabs before add button
      babies.forEach(b => {
        const tab = document.createElement('div');
        tab.className = 'baby-tab' + (b.id === currentBabyId ? ' active' : '');
        tab.innerHTML = `<span class="avatar">${b.avatar||'👶'}</span>${escHtml(b.name)}`;
        tab.onclick = () => { currentBabyId = b.id; renderBabyBar(); renderAll(); };
        tab.oncontextmenu = (e) => { e.preventDefault(); openBabyModal(b.id); };
        bar.insertBefore(tab, addBtn);
      });
    }

    // ══ Summary ══
    function renderSummary() {
      const today = currentBabyId
        ? records.filter(r => r.babyId === currentBabyId && isToday(r.time))
        : [];
      const total = today.reduce((s,r) => s + r.amount, 0);
      const count = today.length;
      const avg = count > 0 ? Math.round(total / count) : 0;
      const baby = babies.find(b => b.id === currentBabyId);

      document.getElementById('totalAmount').textContent = total;
      document.getElementById('totalCount').textContent = `共 ${count} 次`;
      document.getElementById('feedCount').textContent = count;
      document.getElementById('avgAmount').textContent = count > 0 ? `平均 ${avg} ml` : '尚無資料';
      document.getElementById('listHeader').textContent =
        `📋 ${baby ? baby.name + ' ' : ''}今日紀錄`;

      if (count === 0) {
        document.getElementById('lastFeedTime').textContent = '—';
        document.getElementById('lastFeedAgo').textContent = '今天還沒餵奶';
        return;
      }
      const last = [...today].sort((a,b) => new Date(b.time)-new Date(a.time))[0];
      document.getElementById('lastFeedTime').textContent = formatTime(last.time);
      document.getElementById('lastFeedAgo').textContent = timeAgo(last.time);
    }

    // ══ List ══
    function renderList() {
      const today = (currentBabyId
        ? records.filter(r => r.babyId === currentBabyId && isToday(r.time))
        : []
      ).sort((a,b) => new Date(b.time)-new Date(a.time));

      const el = document.getElementById('recordsList');
      if (!currentBabyId) {
        el.innerHTML = `<div class="empty-state"><div class="emoji">👶</div><p>請先點上方「＋」新增寶寶<br>就可以開始記錄囉！</p></div>`;
        return;
      }
      if (today.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="emoji">🌙</div><p>今天還沒有餵奶紀錄<br>點上方按鈕新增第一筆！</p></div>`;
        return;
      }
      el.innerHTML = today.map((r,i) => `
        <div class="record-card">
          <div class="record-icon">🍼</div>
          <div class="record-info">
            <div class="record-time">${formatTime(r.time)}<span class="record-nth">第 ${today.length-i} 次</span></div>
            <div class="record-amount">${r.amount} ml</div>
            <div class="record-meta">${[r.brand ? '🏷️ '+escHtml(r.brand) : '', r.note ? '📝 '+escHtml(r.note) : ''].filter(Boolean).join('　')}</div>
          </div>
          <div class="record-actions">
            <button class="btn-icon btn-edit" onclick="openEditModal('${r.id}')">✏️</button>
            <button class="btn-icon btn-delete" onclick="askDelete('${r.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // ══ Brand chips ══
    function buildBrandChips() {
      document.getElementById('brandChips').innerHTML = BRANDS.map(b =>
        `<div class="brand-chip" onclick="selectBrand(this,'${b}')">${b}</div>`
      ).join('');
    }

    // ══ Emoji grid ══
    function buildEmojiGrid() {
      document.getElementById('emojiGrid').innerHTML = AVATARS.map(e =>
        `<div class="emoji-opt${e===selectedAvatar?' selected':''}" onclick="selectAvatar(this,'${e}')">${e}</div>`
      ).join('');
    }

    // ══ Record Modal ══
    window.openModal = function() {
      if (!currentBabyId) { showToast('⚠️ 請先新增寶寶'); return; }
      editingRecordId = null;
      document.getElementById('modalTitle').textContent = '新增餵奶紀錄';
      document.getElementById('inputTime').value = toLocalISO(new Date());
      setAmount(120);
      document.getElementById('inputBrand').value = '';
      document.getElementById('inputNote').value = '';
      clearChips();
      document.getElementById('modalOverlay').classList.add('open');
    }

    window.openEditModal = function(id) {
      const r = records.find(rec => rec.id === id);
      if (!r) return;
      editingRecordId = id;
      document.getElementById('modalTitle').textContent = '修改餵奶紀錄';
      document.getElementById('inputTime').value = r.time.slice(0,16);
      setAmount(r.amount);
      document.getElementById('inputBrand').value = r.brand || '';
      document.getElementById('inputNote').value = r.note || '';
      clearChips();
      document.querySelectorAll('.brand-chip').forEach(c => { if (c.textContent === r.brand) c.classList.add('selected'); });
      document.getElementById('modalOverlay').classList.add('open');
    }

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('open');
      editingRecordId = null;
    }
    window.handleOverlayClick = e => { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

    function setAmount(v) { currentAmount = Math.max(10, Math.min(999, v)); document.getElementById('amountDisplay').textContent = currentAmount; }
    window.changeAmount = d => setAmount(currentAmount + d);
    window.selectBrand = function(el, brand) { clearChips(); el.classList.add('selected'); document.getElementById('inputBrand').value = brand; }
    function clearChips() { document.querySelectorAll('.brand-chip').forEach(c => c.classList.remove('selected')); }

    window.saveRecord = async function() {
      const time = document.getElementById('inputTime').value;
      const brand = document.getElementById('inputBrand').value.trim();
      const note = document.getElementById('inputNote').value.trim();
      if (!time) { showToast('⚠️ 請填寫時間'); return; }

      if (editingRecordId) {
        const r = records.find(rec => rec.id === editingRecordId);
        if (r?.fbKey) await set(ref(db, 'records/' + r.fbKey), { ...r, time, amount: currentAmount, brand, note, fbKey: undefined });
        showToast('✅ 已更新紀錄');
      } else {
        const newRec = { id: crypto.randomUUID(), babyId: currentBabyId, time, amount: currentAmount, brand, note, createdAt: new Date().toISOString() };
        await push(ref(db, 'records'), newRec);
        showToast('🍼 已新增紀錄');
      }
      closeModal();
    }

    // ══ Baby Modal ══
    window.openBabyModal = function(babyId = null) {
      editingBabyId = babyId;
      const baby = babyId ? babies.find(b => b.id === babyId) : null;
      document.getElementById('babyModalTitle').textContent = baby ? `編輯「${baby.name}」` : '新增寶寶';
      document.getElementById('inputBabyName').value = baby ? baby.name : '';
      selectedAvatar = baby ? (baby.avatar || '👶') : '👶';
      buildEmojiGrid();
      document.getElementById('babyModalOverlay').classList.add('open');
    }
    window.closeBabyModal = function() {
      document.getElementById('babyModalOverlay').classList.remove('open');
      editingBabyId = null;
    }
    window.handleBabyOverlayClick = e => { if (e.target===document.getElementById('babyModalOverlay')) closeBabyModal(); }
    window.selectAvatar = function(el, emoji) {
      document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedAvatar = emoji;
    }
    window.saveBaby = async function() {
      const name = document.getElementById('inputBabyName').value.trim();
      if (!name) { showToast('⚠️ 請輸入寶寶名字'); return; }

      if (editingBabyId) {
        const b = babies.find(b => b.id === editingBabyId);
        if (b?.fbKey) await set(ref(db, 'babies/' + b.fbKey), { id: b.id, name, avatar: selectedAvatar });
        showToast('✅ 已更新寶寶資料');
      } else {
        const newBaby = { id: crypto.randomUUID(), name, avatar: selectedAvatar };
        const pushed = await push(ref(db, 'babies'), newBaby);
        currentBabyId = newBaby.id;
        showToast(`🎉 已新增 ${name}！`);
      }
      closeBabyModal();
    }

    // ══ Delete ══
    window.askDelete = id => { deletingId = id; document.getElementById('confirmOverlay').classList.add('open'); }
    window.closeConfirm = () => { document.getElementById('confirmOverlay').classList.remove('open'); deletingId = null; }
    window.confirmDelete = async function() {
      if (!deletingId) return;
      const r = records.find(rec => rec.id === deletingId);
      if (r?.fbKey) await remove(ref(db, 'records/' + r.fbKey));
      closeConfirm();
      showToast('🗑️ 已刪除紀錄');
    }

    // ══ Helpers ══
    function toLocalISO(d) { return new Date(d - d.getTimezoneOffset()*60000).toISOString().slice(0,16); }
    function isToday(iso) {
      const d = new Date(iso), n = new Date();
      return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
    }
    function formatTime(iso) { return new Date(iso).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12:false }); }
    function timeAgo(iso) {
      const m = Math.floor((Date.now()-new Date(iso))/60000);
      if (m < 1) return '剛剛';
      if (m < 60) return `${m} 分鐘前`;
      const h = Math.floor(m/60), rm = m%60;
      return rm > 0 ? `${h} 小時 ${rm} 分前` : `${h} 小時前`;
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }
    window.showToast = showToast;

    init();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  </script>
</body>
</html>
